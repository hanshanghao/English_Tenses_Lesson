<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Gestures Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  background:#0a0a1a;
  overflow-x:hidden;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.bg-particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:4px;height:4px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}
.glow-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.orb1{width:400px;height:400px;background:#6c5ce7;top:-100px;left:-100px;opacity:0.3;animation:drift1 8s ease-in-out infinite}
.orb2{width:350px;height:350px;background:#00cec9;bottom:-100px;right:-100px;opacity:0.25;animation:drift2 10s ease-in-out infinite}
.orb3{width:300px;height:300px;background:#fd79a8;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.15;animation:pulse 6s ease-in-out infinite}
@keyframes drift1{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(60px,40px)}
}
@keyframes drift2{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(-50px,-60px)}
}
@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.15}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.25}
}
.game-container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:520px;
  padding:20px;
  margin:20px;
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  flex-wrap:wrap;
  gap:10px;
}
.header h1{
  font-family:'Fredoka One',cursive;
  font-size:24px;
  background:linear-gradient(135deg,#6c5ce7,#fd79a8,#00cec9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:1px;
}
.score-box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:8px 18px;
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:700;
  font-size:16px;
}
.score-box .num{
  color:#fdcb6e;
  font-size:22px;
}
.progress-bar-wrap{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:3px;
  margin-bottom:20px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#6c5ce7,#fd79a8);
  border-radius:3px;
  transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  width:0%;
}
.shadow-card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;
  padding:28px 22px 22px;
  position:relative;
  overflow:hidden;
  transition:transform 0.3s;
}
.shadow-card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:28px;
  padding:1px;
  background:linear-gradient(135deg,rgba(108,92,231,0.3),rgba(0,206,201,0.15),rgba(253,121,168,0.3));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}
.shadow-stage{
  background:radial-gradient(ellipse at center,rgba(108,92,231,0.12) 0%,rgba(0,0,0,0.3) 100%);
  border-radius:20px;
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:280px;
  position:relative;
  cursor:pointer;
}
.shadow-stage svg{
  width:100%;
  max-height:260px;
  filter:drop-shadow(0 0 30px rgba(108,92,231,0.3));
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.shadow-stage:hover svg{
  transform:scale(1.03);
}
.shadow-hint{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:rgba(255,255,255,0.3);
  letter-spacing:2px;
  text-transform:uppercase;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{
  0%,100%{opacity:0.3}
  50%{opacity:0.7}
}
.question-number{
  text-align:center;
  margin-top:12px;
  font-size:13px;
  color:rgba(255,255,255,0.5);
  font-weight:600;
  letter-spacing:1px;
}
.question-number span{color:#fdcb6e;font-size:16px}
.word-bank{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}
.word-btn{
  position:relative;
  padding:14px 10px;
  border:2px solid rgba(255,255,255,0.12);
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  color:#fff;
  font-size:16px;
  font-weight:700;
  font-family:'Nunito',sans-serif;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  overflow:hidden;
  letter-spacing:0.5px;
  text-transform:capitalize;
}
.word-btn::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(108,92,231,0.15),rgba(0,206,201,0.08));
  opacity:0;
  transition:opacity 0.3s;
}
.word-btn:hover:not(:disabled){
  transform:translateY(-3px) scale(1.02);
  border-color:rgba(108,92,231,0.4);
  box-shadow:0 8px 30px rgba(108,92,231,0.2);
}
.word-btn:hover:not(:disabled)::before{opacity:1}
.word-btn:active:not(:disabled){transform:translateY(-1px) scale(0.98)}
.word-btn:disabled{cursor:not-allowed;opacity:0.6}
.word-btn.correct{
  border-color:#00cec9 !important;
  background:rgba(0,206,201,0.2) !important;
  box-shadow:0 0 30px rgba(0,206,201,0.2);
  animation:correctPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.word-btn.wrong{
  border-color:#ff7675 !important;
  background:rgba(255,118,117,0.15) !important;
  animation:shake 0.5s;
}
@keyframes correctPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.12)}
  100%{transform:scale(1)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.fact-box{
  margin-top:14px;
  padding:14px 18px;
  background:rgba(253,203,110,0.08);
  border:1px solid rgba(253,203,110,0.2);
  border-radius:14px;
  font-size:14px;
  color:rgba(255,255,255,0.8);
  display:none;
  animation:fadeUp 0.5s ease;
  line-height:1.6;
}
.fact-box.show{display:block}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.next-btn{
  display:none;
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  color:#fff;
  font-size:16px;
  font-weight:800;
  font-family:'Nunito',sans-serif;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing:1px;
  text-transform:uppercase;
}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,92,231,0.4)}
.next-btn.show{display:block;animation:fadeUp 0.4s ease}
.speak-btn{
  position:absolute;
  top:14px;right:14px;
  width:42px;height:42px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.6);
  cursor:pointer;
  font-size:18px;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(8px);
  z-index:5;
}
.speak-btn:hover{
  background:rgba(108,92,231,0.2);
  border-color:rgba(108,92,231,0.4);
  color:#fff;
  transform:scale(1.1);
}
.speak-btn.speaking{
  background:rgba(0,206,201,0.25);
  border-color:#00cec9;
  color:#00cec9;
  animation:speakPulse 0.8s ease-in-out infinite;
}
@keyframes speakPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,206,201,0.3)}
  50%{box-shadow:0 0 0 12px rgba(0,206,201,0)}
}
.footer-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}
.restart-btn,.sound-toggle{
  flex:1;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.6);
  font-size:13px;
  font-weight:700;
  font-family:'Nunito',sans-serif;
  cursor:pointer;
  transition:all 0.3s;
  letter-spacing:0.5px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.restart-btn:hover,.sound-toggle:hover{
  background:rgba(255,255,255,0.08);
  color:#fff;
  border-color:rgba(255,255,255,0.2);
}
.confetti-container{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:100;
  overflow:hidden;
}
.confetti-piece{
  position:absolute;
  width:10px;height:10px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.completion-screen{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px 20px;
  animation:fadeUp 0.6s ease;
}
.completion-screen.show{display:flex}
.trophy{font-size:72px;margin-bottom:12px;animation:bounce 1s ease infinite}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}
.completion-screen h2{
  font-family:'Fredoka One',cursive;
  font-size:28px;
  background:linear-gradient(135deg,#fdcb6e,#e17055);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.completion-screen p{color:rgba(255,255,255,0.6);font-size:16px;margin-bottom:4px}
.completion-screen .final-score{font-size:52px;font-weight:800;color:#fdcb6e;margin:10px 0}
.stars-row{display:flex;gap:8px;margin:10px 0 16px}
.stars-row .star{font-size:36px;opacity:0.2;transition:all 0.4s}
.stars-row .star.active{opacity:1;animation:starPop 0.4s ease}
@keyframes starPop{
  0%{transform:scale(0)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}
.play-again-btn{
  padding:16px 40px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#6c5ce7,#fd79a8);
  color:#fff;
  font-size:18px;
  font-weight:800;
  font-family:'Nunito',sans-serif;
  cursor:pointer;
  transition:all 0.3s;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:8px;
}
.play-again-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(108,92,231,0.4);
}
.game-content{display:block}
.game-content.hide{display:none}
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  transform:scale(0);
  animation:rippleAnim 0.6s ease-out;
  pointer-events:none;
}
@keyframes rippleAnim{
  to{transform:scale(4);opacity:0}
}
.streak-badge{
  display:none;
  position:absolute;
  top:-10px;right:-8px;
  background:linear-gradient(135deg,#fdcb6e,#e17055);
  color:#0a0a1a;
  font-size:11px;
  font-weight:800;
  padding:3px 10px;
  border-radius:20px;
  animation:bounce 0.5s ease;
  z-index:5;
  box-shadow:0 4px 15px rgba(253,203,110,0.3);
}
.streak-badge.show{display:block}
.timer-wrap{
  width:100%;
  height:3px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;
  margin-top:10px;
  overflow:hidden;
}
.timer-bar{
  height:100%;
  background:linear-gradient(90deg,#00cec9,#fdcb6e);
  border-radius:2px;
  transition:width 0.1s linear;
  width:100%;
}
@media(max-width:480px){
  .game-container{padding:12px;margin:8px}
  .shadow-card{padding:20px 14px 16px;border-radius:22px}
  .shadow-stage{min-height:220px;padding:14px}
  .word-btn{font-size:14px;padding:12px 8px}
  .header h1{font-size:20px}
  .score-box{font-size:14px;padding:6px 14px}
  .word-bank{gap:8px}
}
</style>
</head>
<body>
<div class="bg-particles" id="particles"></div>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>
<div class="glow-orb orb3"></div>

<div class="game-container">
  <div class="header">
    <h1>✦ Shadow Game</h1>
    <div class="score-box">
      <span>🏆</span>
      <span class="num" id="scoreDisplay">0</span>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="game-content" id="gameContent">
    <div class="shadow-card">
      <button class="speak-btn" id="speakBtn" title="Pronounce word">🔊</button>
      <div class="streak-badge" id="streakBadge">🔥 STREAK</div>
      <div class="shadow-stage" id="shadowStage">
        <svg id="shadowSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="shadow-hint">⟐ guess the shadow ⟐</div>
      </div>
      <div class="question-number">Question <span id="qNum">1</span> of <span id="qTotal">20</span></div>
      <div class="timer-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="word-bank" id="wordBank"></div>
      <div class="fact-box" id="factBox"></div>
      <button class="next-btn" id="nextBtn">Next →</button>
    </div>
    <div class="footer-actions">
      <button class="restart-btn" id="restartBtn">⟳ Restart</button>
      <button class="sound-toggle" id="soundToggle">🔊 Sound</button>
    </div>
  </div>

  <div class="completion-screen" id="completionScreen">
    <div class="trophy">🏆</div>
    <h2>Amazing!</h2>
    <p>You completed the shadow challenge</p>
    <div class="final-score" id="finalScore">0/20</div>
    <div class="stars-row" id="starsRow">
      <span class="star" data-i="0">⭐</span>
      <span class="star" data-i="1">⭐</span>
      <span class="star" data-i="2">⭐</span>
    </div>
    <p id="completionMsg" style="color:rgba(255,255,255,0.5);font-size:14px"></p>
    <button class="play-again-btn" id="playAgainBtn">Play Again</button>
  </div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<script>

// ===== GAME ENGINE =====
const ALL_NAMES = ANIMALS.map(a => a.name);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuestions(animals) {
  const shuffled = shuffle(animals);
  return shuffled.map(animal => {
    const wrongPool = ALL_NAMES.filter(n => n !== animal.name);
    const wrong = shuffle(wrongPool).slice(0, 3);
    const options = shuffle([animal.name, ...wrong]);
    return { ...animal, options };
  });
}

function renderShapes(animal) {
  const svg = shadowSvg;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  (animal.shapes||[]).forEach(s => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', s.type);
    const fill = s.fill || '#1a1a3e';
    const stroke = s.stroke || '';
    const sw = s['stroke-width'] || '';
    for (let k of Object.keys(s)) {
      if (k === 'type' || k === 'fill' || k === 'stroke' || k === 'stroke-width') continue;
      el.setAttribute(k, s[k]);
    }
    el.setAttribute('fill', s.fill !== undefined ? s.fill : '#1a1a3e');
    if (s.stroke) el.setAttribute('stroke', s.stroke);
    if (s['stroke-width']) el.setAttribute('stroke-width', s['stroke-width']);
    svg.appendChild(el);
  });
}

// Particles
(function initParticles() {
  const c = $('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 18) + 's';
    p.style.animationDelay = Math.random() * 15 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    c.appendChild(p);
  }
})();

function speak(text) {
  if (!soundEnabled) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.92;
  u.pitch = 1.05;
  speakBtn.classList.add('speaking');
  u.onend = () => speakBtn.classList.remove('speaking');
  u.onerror = () => speakBtn.classList.remove('speaking');
  window.speechSynthesis.speak(u);
}

function launchConfetti(count = 50) {
  const colors = ['#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#e17055','#00b894','#0984e3','#d63031'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 8;
    el.style.width = size + 'px';
    el.style.height = size * (0.4 + Math.random() * 0.8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 0.8 + 's';
    confettiContainer.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function startTimer() {
  stopTimer();
  timerValue = 100;
  timerBar.style.width = '100%';
  const start = Date.now();
  timerInterval = setInterval(() => {
    const frac = Math.max(0, 1 - (Date.now() - start) / 1000 / TIMER_DURATION);
    timerBar.style.width = (frac * 100) + '%';
    if (Date.now() - start >= TIMER_DURATION * 1000) {
      stopTimer();
      if (!answered) handleTimeout();
    }
  }, 50);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function handleTimeout() {
  if (answered) return;
  answered = true; streak = 0; streakBadge.classList.remove('show');
  highlightCorrect();
  speak(questions[currentQ].name);
  factBox.textContent = '⏰ Time\'s up! The answer was: ' + questions[currentQ].name + ' ' + questions[currentQ].fact;
  factBox.className = 'fact-box show';
  disableButtons();
  nextBtn.className = 'next-btn show';
}

function loadQuestion() {
  answered = false; streakBadge.classList.remove('show');
  const q = questions[currentQ];
  if (!q) return;
  qNum.textContent = currentQ + 1;
  qTotal.textContent = questions.length;
  renderShapes(q);
  factBox.className = 'fact-box'; factBox.textContent = '';
  nextBtn.className = 'next-btn';
  wordBank.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.textContent = opt;
    btn.dataset.word = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, q.name));
    wordBank.appendChild(btn);
  });
  progressBar.style.width = ((currentQ / questions.length) * 100) + '%';
  startTimer();
  speakBtn.onclick = () => speak(q.name);
}

function handleAnswer(btn, chosen, correct) {
  if (answered) return; stopTimer(); answered = true; disableButtons();
  if (chosen === correct) {
    btn.classList.add('correct'); score++; streak++;
    scoreDisplay.textContent = score;
    if (streak >= 3) { streakBadge.classList.add('show'); streakBadge.textContent = '🔥 ' + streak + ' STREAK'; }
    launchConfetti(35);
    speak(correct);
    factBox.textContent = '✅ Correct! ' + questions[currentQ].fact;
  } else {
    btn.classList.add('wrong'); streak = 0; streakBadge.classList.remove('show');
    highlightCorrect(); speak(correct);
    factBox.textContent = '❌ The answer was: ' + correct + '. ' + questions[currentQ].fact;
  }
  factBox.className = 'fact-box show';
  nextBtn.className = 'next-btn show';
  progressBar.style.width = ((currentQ / questions.length) * 100) + '%';
}

function highlightCorrect() {
  wordBank.querySelectorAll('.word-btn').forEach(b => {
    if (b.dataset.word === questions[currentQ].name) b.classList.add('correct');
  });
}

function disableButtons() {
  wordBank.querySelectorAll('.word-btn').forEach(b => b.disabled = true);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showCompletion();
  else loadQuestion();
}

function showCompletion() {
  stopTimer();
  gameContent.classList.add('hide');
  completionScreen.classList.add('show');
  finalScore.textContent = score + '/' + questions.length;
  const pct = score / questions.length;
  const starCount = pct >= 0.9 ? 3 : pct >= 0.6 ? 2 : pct >= 0.3 ? 1 : 0;
  starsRow.querySelectorAll('.star').forEach((s, i) => {
    setTimeout(() => { if (i < starCount) s.classList.add('active'); }, i * 300);
  });
  const msgs = ['Keep practicing! You\'ll get better! 🌱','Good effort! Try again! 💪','Great job! You know your shadows! 🌟','Amazing! You\'re a shadow master! 🏆'];
  completionMsg.textContent = msgs[starCount];
  if (starCount >= 2) launchConfetti(60);
  speak('Well done! You scored ' + score + ' out of ' + questions.length);
}

function initGame() {
  stopTimer(); currentQ = 0; score = 0; streak = 0; answered = false;
  scoreDisplay.textContent = '0'; streakBadge.classList.remove('show');
  gameContent.classList.remove('hide'); completionScreen.classList.remove('show');
  questions = shuffleQuestions(ANIMALS).slice(0, QUESTIONS_PER_GAME);
  loadQuestion();
}

nextBtn.addEventListener('click', nextQuestion);
restartBtn.addEventListener('click', initGame);
playAgainBtn.addEventListener('click', initGame);
soundToggle.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  soundToggle.textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';
  if (!soundEnabled) window.speechSynthesis.cancel();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && nextBtn.classList.contains('show')) nextQuestion();
  if (e.key === 'r' || e.key === 'R') initGame();
  if (e.key >= '1' && e.key <= '4' && !answered) {
    const btns = wordBank.querySelectorAll('.word-btn');
    if (btns[parseInt(e.key)-1]) btns[parseInt(e.key)-1].click();
  }
});

shadowStage.addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = 60;
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  this.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
  if (questions[currentQ]) speak(questions[currentQ].name);
});

initGame();
</script>
</body>
</html>
