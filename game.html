<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Learning Game</title>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.0/qrcode.min.js"></script>
  <style>
    .blue { color: blue; font-weight: bold; }
    body { font-family: 'Comic Sans MS', cursive, sans-serif; background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24); background-size: 400% 400%; animation: gradientShift 10s ease infinite; text-align: center; }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
    h1 { color: #333; font-size: 2.5em; text-shadow: 2px 2px #ff6b6b; }
    button { background: #4ecdc4; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 10px; cursor: pointer; margin: 10px; transition: background 0.3s; }
    button:hover { background: #45b7d1; }
    .quiz { display: none; padding: 20px; }
    .active { display: block; }
    #vocabWord { font-size: 2em; margin: 20px; padding: 10px; background: #f9ca24; border-radius: 10px; }
    #sentenceImage img { width: 300px; height: 200px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    .options { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
    .option { margin: 10px; padding: 15px; border: 2px solid #333; cursor: pointer; border-radius: 10px; background: #fff; transition: background 0.3s, transform 0.2s; font-size: 1.1em; }
    .option:hover { background: #ff6b6b; color: white; transform: scale(1.05); }
    img { width: 200px; height: 150px; margin: 10px; border: 3px solid #333; cursor: pointer; border-radius: 10px; transition: transform 0.2s; }
    img:hover { transform: scale(1.1); }
    .highlight { animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .leaderboard { background: #fff; border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    .leaderboard table { width: 100%; border-collapse: collapse; }
    .leaderboard th, .leaderboard td { padding: 10px; text-align: center; border: 1px solid #333; }
    .leaderboard th { background: #4ecdc4; color: white; }
    .leaderboard tr:nth-child(even) { background: #f9f9f9; }
    #qrCode { border: 2px solid #333; padding: 10px; background: white; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 English Learning Game! 🎉</h1>
    <div id="multiplayerSetup">
      <p id="statusText">Setting up game...</p>
      <div id="hostUI" style="display:none;">
        <p>Room ID: <span id="roomId"></span></p>
        <div id="qrCode">Generating QR code...</div>
        <p>Share the QR code for students to join.</p>
        <select id="quizTypeSelect">
          <option value="vocab">Vocabulary Quiz</option>
          <option value="sentences">Sentences Drill</option>
        </select>
        <button id="startMultiQuiz">🚀 Start Quiz</button>
      </div>
    </div>
    <div id="multiQuestion" class="quiz" style="display:none;">
      <div id="questionContent"></div>
      <div id="multiOptions" class="options"></div>
    </div>
    <div id="status"></div>
    <div id="leaderboard" class="leaderboard" style="display:none;">
      <h2>🏆 Leaderboard</h2>
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
  </div>
  <script>
    const vocabulary = [
      { word: 'bathroom', image: 'https://source.unsplash.com/featured/?bathroom' },
      { word: 'bedroom', image: 'https://source.unsplash.com/featured/?bedroom' },
      { word: 'kitchen', image: 'https://source.unsplash.com/featured/?kitchen' },
      { word: 'dining room', image: 'https://source.unsplash.com/featured/?dining+room' },
      { word: 'living room', image: 'https://source.unsplash.com/featured/?living+room' },
      { word: 'cooking', image: 'https://source.unsplash.com/featured/?cooking' },
      { word: 'eating', image: 'https://source.unsplash.com/featured/?eating' },
      { word: 'reading', image: 'https://source.unsplash.com/featured/?reading' },
      { word: 'sleeping', image: 'https://source.unsplash.com/featured/?sleeping' },
      { word: 'writing', image: 'https://source.unsplash.com/featured/?writing' },
      { word: 'running', image: 'https://source.unsplash.com/featured/?running' },
      { word: 'a hamburger', image: 'https://source.unsplash.com/featured/?hamburger' },
      { word: 'a hot dog', image: 'https://source.unsplash.com/featured/?hot+dog' },
      { word: 'juice', image: 'https://source.unsplash.com/featured/?juice' },
      { word: 'milk', image: 'https://source.unsplash.com/featured/?milk' },
      { word: 'water', image: 'https://source.unsplash.com/featured/?water' },
      { word: 'ice cream', image: 'https://source.unsplash.com/featured/?ice+cream' },
      { word: 'bears', image: 'https://source.unsplash.com/featured/?bear' },
      { word: 'lions', image: 'https://source.unsplash.com/featured/?lion' },
      { word: 'monkeys', image: 'https://source.unsplash.com/featured/?monkey' },
      { word: 'tigers', image: 'https://source.unsplash.com/featured/?tiger' },
      { word: 'zebras', image: 'https://source.unsplash.com/featured/?zebra' },
      { word: 'a sachet', image: 'https://source.unsplash.com/featured/?tea+sachet' },
      { word: 'a dragon boat race', image: 'https://source.unsplash.com/featured/?dragon+boat+race' },
      { word: 'a rice dumpling', image: 'https://source.unsplash.com/featured/?rice+dumpling' },
      { word: 'stand an egg', image: 'https://source.unsplash.com/featured/?standing+egg' },
    ];
    const sentences = [
      { text: 'Where are you? I’m in the bedroom.', image: 'https://source.unsplash.com/featured/?person+in+bedroom' },
      { text: 'Where’s Kevin? He’s in the dining room.', image: 'https://source.unsplash.com/featured/?boy+in+dining+room' },
      { text: 'Where’s Mom? She’s in the dining room.', image: 'https://source.unsplash.com/featured/?woman+in+dining+room' },
      { text: 'What are you doing? I’m reading.', image: 'https://source.unsplash.com/featured/?person+reading' },
      { text: 'What’s he doing? He’s sleeping.', image: 'https://source.unsplash.com/featured/?man+sleeping' },
      { text: 'What’s she doing? She’s sleeping.', image: 'https://source.unsplash.com/featured/?woman+sleeping' },
      { text: 'What do you want for lunch? I want a hot dog.', image: 'https://source.unsplash.com/featured/?hot+dog' },
      { text: 'What do you want for lunch? I want two hamburgers.', image: 'https://source.unsplash.com/featured/?hamburgers' },
      { text: 'What do you want for lunch? I want some juice.', image: 'https://source.unsplash.com/featured/?juice' },
      { text: 'Do you like bears? Yes, I do.', image: 'https://source.unsplash.com/featured/?bear' },
      { text: 'Do you like bears? No, I don’t. I like tigers.', image: 'https://source.unsplash.com/featured/?tiger' },
      { text: 'What are these? They’re rice dumplings.', image: 'https://source.unsplash.com/featured/?rice+dumplings' },
      { text: 'What are those? They’re rice dumplings.', image: 'https://source.unsplash.com/featured/?rice+dumplings' },
      { text: 'This is for you.', image: 'https://source.unsplash.com/featured/?giving+gift' },
      { text: 'Cool!', image: 'https://source.unsplash.com/featured/?cool' },
      { text: 'I’m done.', image: 'https://source.unsplash.com/featured/?finished' },
      { text: 'Me too.', image: 'https://source.unsplash.com/featured/?also+done' },
      { text: 'Good idea!', image: 'https://source.unsplash.com/featured/?good+idea' },
      { text: 'How about you?', image: 'https://source.unsplash.com/featured/?asking' },
      { text: 'Have fun!', image: 'https://source.unsplash.com/featured/?having+fun' },
      { text: 'Help!', image: 'https://source.unsplash.com/featured/?help' },
    ];
    let isHost = false;
    let peer;
    let connections = [];
    let players = {};
    let myName = '';
    let currentAnswers = {};
    let quizType = '';
    let currentQuiz = [];
    let currentIndex = 0;
    let correctAnswer = 0;
    const synth = window.speechSynthesis;
    let britishFemale;
    synth.onvoiceschanged = () => {
      const voices = synth.getVoices();
      britishFemale = voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('female')) || voices.find(v => v.lang === 'en-GB') || voices.find(v => v.name.toLowerCase().includes('british')) || voices[0];
    };
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');
    if (room) {
      document.getElementById('statusText').textContent = 'Joining game...';
      myName = prompt('Enter your name:');
      if (myName) {
        peer = new Peer();
        peer.on('open', () => {
          const conn = peer.connect(room);
          conn.on('open', () => {
            connections.push(conn);
            conn.send({type: 'join', name: myName});
            document.getElementById('multiplayerSetup').style.display = 'none';
          });
          conn.on('data', data => handleData(conn, data));
        });
      }
    } else {
      document.getElementById('statusText').textContent = 'Hosting game...';
      isHost = true;
      document.getElementById('hostUI').style.display = 'block';
      peer = new Peer();
      peer.on('open', id => {
        document.getElementById('roomId').textContent = id;
        QRCode.toCanvas(document.getElementById('qrCode'), window.location.href + '?room=' + id, {width: 200});
      });
      peer.on('connection', conn => {
        conn.on('data', data => handleData(conn, data));
        conn.on('open', () => {
          connections.push(conn);
          conn.send({type: 'welcome'});
        });
      });
    }
    function highlightText(text) {
      return text
        .replace(/([aeiou])/gi, '<span class="blue">$1</span>')
        .replace(/\b(is|are|a|am)\b/gi, '<span class="blue">$1</span>')
        .replace(/(\w+ing)/gi, '<span class="blue">$1</span>');
    }
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.voice = britishFemale;
      utterance.rate = 0.6;
      utterance.pitch = 1.2;
      synth.speak(utterance);
    }
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }
    document.getElementById('connectBtn').onclick = () => {
      const id = document.getElementById('joinId').value;
      peer = new Peer();
      peer.on('open', () => {
        const conn = peer.connect(id);
        conn.on('open', () => {
          connections.push(conn);
          myName = prompt('Enter your name:');
          conn.send({type: 'join', name: myName});
          document.getElementById('multiplayerSetup').style.display = 'none';
        });
        conn.on('data', data => handleData(conn, data));
      });
    };
    document.getElementById('showJoinQR').onclick = () => {
      const id = document.getElementById('joinId').value;
      if (id) {
        QRCode.toCanvas(document.getElementById('joinQR'), window.location.href + '?room=' + id, {width: 200});
      } else {
        alert('Enter Room ID first');
      }
    };
    function handleData(conn, data) {
      if (data.type === 'join') {
        players[conn.peer] = {name: data.name, score: 0};
      } else if (data.type === 'answer') {
        currentAnswers[conn.peer] = data.answerIdx;
      } else if (data.type === 'startQuiz') {
        quizType = data.quizType;
        startMultiQuiz();
      } else if (data.type === 'question') {
        showMultiQuestion(data.question);
      } else if (data.type === 'results') {
        showResults(data.results, data.correctText);
      } else if (data.type === 'leaderboard') {
        showLeaderboard(data.leaderboard);
      }
    }
    document.getElementById('startMultiQuiz').onclick = () => {
      quizType = document.getElementById('quizTypeSelect').value;
      connections.forEach(conn => conn.send({type: 'startQuiz', quizType}));
      document.getElementById('multiplayerSetup').style.display = 'none';
      startMultiQuiz();
    };
    function startMultiQuiz() {
      currentQuiz = quizType === 'vocab' ? [...vocabulary] : [...sentences];
      shuffle(currentQuiz);
      currentIndex = 0;
      showMultiQuestionHost();
    }
    function showMultiQuestionHost() {
      if (currentIndex >= currentQuiz.length) {
        const leaderboard = Object.values(players).sort((a,b) => b.score - a.score);
        connections.forEach(conn => conn.send({type: 'leaderboard', leaderboard}));
        showLeaderboard(leaderboard);
        return;
      }
      const question = currentQuiz[currentIndex];
      connections.forEach(conn => conn.send({type: 'question', question}));
      showMultiQuestion(question);
      currentAnswers = {};
      setTimeout(() => {
        const results = {};
        connections.forEach(conn => {
          const pid = conn.peer;
          const answer = currentAnswers[pid];
          const correct = answer === correctAnswer;
          if (correct) players[pid].score++;
          results[pid] = {name: players[pid].name, correct, answer};
        });
        const correctText = quizType === 'vocab' ? question.word : question.text;
        connections.forEach(conn => conn.send({type: 'results', results, correctText}));
        showResults(results, correctText);
        currentIndex++;
        setTimeout(showMultiQuestionHost, 5000);
      }, 10000);
    }
    function showMultiQuestion(question) {
      document.getElementById('multiQuestion').style.display = 'block';
      document.getElementById('status').innerHTML = '';
      const content = document.getElementById('questionContent');
      const optionsDiv = document.getElementById('multiOptions');
      optionsDiv.innerHTML = '';
      if (quizType === 'vocab') {
        content.innerHTML = '<h2>' + highlightText(question.word) + '</h2><p>Click the correct picture!</p>';
        speak(question.word);
        const options = [question];
        while (options.length < 4) {
          const random = vocabulary[Math.floor(Math.random() * vocabulary.length)];
          if (!options.some(o => o.word === random.word)) options.push(random);
        }
        shuffle(options);
        correctAnswer = options.findIndex(o => o.word === question.word);
        options.forEach((opt, idx) => {
          const img = document.createElement('img');
          img.src = opt.image;
          img.onclick = () => {
            if (!isHost) connections[0].send({type: 'answer', answerIdx: idx});
          };
          optionsDiv.appendChild(img);
        });
      } else {
        const img = document.createElement('img');
        img.src = question.image;
        content.innerHTML = '<h2>Sentences Drill</h2>';
        content.appendChild(img);
        content.innerHTML += '<p>Choose the correct sentence!</p>';
        speak(question.text);
        const options = [question];
        while (options.length < 4) {
          const random = sentences[Math.floor(Math.random() * sentences.length)];
          if (!options.some(o => o.text === random.text)) options.push(random);
        }
        shuffle(options);
        correctAnswer = options.findIndex(o => o.text === question.text);
        options.forEach((opt, idx) => {
          const div = document.createElement('div');
          div.className = 'option';
          div.innerHTML = highlightText(opt.text);
          div.onclick = () => {
            if (!isHost) connections[0].send({type: 'answer', answerIdx: idx});
          };
          optionsDiv.appendChild(div);
        });
      }
    }
    function showResults(results, correctText) {
      let html = '<h3>Results:</h3>';
      for (const pid in results) {
        const r = results[pid];
        html += `<p>${r.name}: ${r.correct ? '✅ Correct' : '❌ Wrong'} (Correct: ${highlightText(correctText)})</p>`;
      }
      document.getElementById('status').innerHTML = html;
      speak('Results: ' + Object.values(results).map(r => r.name + (r.correct ? ' correct' : ' wrong')).join(', '));
    }
    function showLeaderboard(leaderboard) {
      document.getElementById('multiQuestion').style.display = 'none';
      document.getElementById('status').innerHTML = '';
      document.getElementById('leaderboard').style.display = 'block';
      const tbody = document.getElementById('leaderboardBody');
      tbody.innerHTML = '';
      leaderboard.forEach((p, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx + 1}</td><td>${p.name}</td><td>${p.score}</td>`;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
