<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>👨‍👩‍👧‍👦 Family & Careers • Multiplayer Quiz</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #1a2b4a 0%, #2d4a7a 100%);
      min-height: 100vh;
      padding: 16px;
      color: #1A2B4A;
    }
    .game-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    /* header + QR + players */
    .top-bar {
      background: rgba(255,255,245,0.9);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border-left: 8px solid #FFD54F;
    }
    .qr-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .qr-box {
      background: #fff;
      padding: 10px;
      border-radius: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }
    .qr-box svg {
      display: block;
      width: 90px;
      height: 90px;
    }
    .session-info h3 {
      font-family: 'Fredoka One', cursive;
      color: #1A2B4A;
      font-size: 1.5rem;
    }
    .session-info p {
      font-weight: 700;
      color: #4FC3F7;
    }
    .players-panel {
      background: #fff7e6;
      border-radius: 28px;
      padding: 12px 20px;
      min-width: 200px;
    }
    .players-panel .label {
      font-weight: 800;
      color: #9575CD;
      letter-spacing: 1px;
    }
    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 8px;
    }
    .player-badge {
      background: #4FC3F7;
      color: white;
      padding: 4px 14px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    /* leaderboard */
    .leaderboard-wrap {
      background: #FFD54F;
      border-radius: 24px;
      padding: 14px 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      box-shadow: 0 8px 0 #b47d00;
    }
    .lb-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
    }
    .top-three {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .top-player {
      background: white;
      border-radius: 40px;
      padding: 6px 18px 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      box-shadow: 0 4px 0 #ccc;
    }
    .trophy { font-size: 1.5rem; }
    /* main quiz card */
    .quiz-card {
      background: #FFFFFF;
      border-radius: 40px;
      padding: 28px 30px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
      margin-bottom: 20px;
      border-bottom: 8px solid #66BB6A;
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      color: #6b7a99;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      margin-bottom: 28px;
      color: #1A2B4A;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .opt-btn {
      background: #f2f6ff;
      border: 3px solid #d0d9ef;
      border-radius: 24px;
      padding: 18px 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1A2B4A;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .opt-btn:hover { background: #e0f0ff; border-color: #4FC3F7; transform: scale(0.98); }
    .opt-btn.disabled-true { opacity: 0.6; pointer-events: none; }
    .opt-prefix {
      width: 40px; height: 40px;
      background: #4FC3F7; color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
    }
    .feedback-bar {
      margin-top: 24px;
      background: #f2f6ff;
      border-radius: 20px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .stats {
      display: flex;
      gap: 24px;
      font-weight: 700;
    }
    .correct-count { color: #2e7d32; }
    .wrong-count { color: #c62828; }
    .next-btn {
      background: #FFD54F;
      border: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 1.3rem;
      margin-left: auto;
      cursor: pointer;
      box-shadow: 0 5px 0 #b47d00;
      transition: 0.1s;
    }
    .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b47d00; }
    .next-btn:disabled { opacity: 0.4; pointer-events: none; }
    .host-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    .ctrl-btn {
      background: #9575CD;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
    }
    .name-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .modal-card {
      background: white; border-radius: 48px; padding: 32px; width: 360px;
      text-align: center;
    }
    input {
      padding: 14px; width: 100%; border-radius: 40px; border: 2px solid #ccc;
      font-size: 1.1rem; margin: 20px 0;
    }
    .join-btn {
      background: #66BB6A; color: white; border: none; padding: 14px 30px;
      border-radius: 50px; font-weight: 800; width: 100%; cursor: pointer;
    }
    @media (max-width: 700px) {
      .options-grid { grid-template-columns: 1fr; }
      .top-bar { flex-direction: column; align-items: start; }
    }
  </style>
</head>
<body>
<div class="game-container" id="app">
  <!-- name modal -->
  <div id="nameModal" class="name-modal">
    <div class="modal-card">
      <h2>✨ Join Game</h2>
      <p style="margin-top:8px;">Enter your name</p>
      <input type="text" id="playerNameInput" placeholder="e.g. Alex" maxlength="14" autocomplete="off">
      <button class="join-btn" onclick="app.joinGame()">🚀 Join & Play</button>
      <p style="margin-top:16px; font-size:0.8rem;">Scan QR to join from another device</p>
    </div>
  </div>

  <!-- top bar -->
  <div class="top-bar">
    <div class="qr-section">
      <div class="qr-box" id="qrContainer"></div>
      <div class="session-info">
        <h3>📡 Session: <span id="sessionIdDisplay">FAM123</span></h3>
        <p>🔗 <span id="gameUrl">loading...</span></p>
      </div>
    </div>
    <div class="players-panel">
      <div class="label">👥 PLAYERS (<span id="playerCount">0</span>)</div>
      <div class="player-list" id="playerList"></div>
    </div>
  </div>

  <!-- leaderboard -->
  <div class="leaderboard-wrap">
    <span class="lb-title">🏆 LEADERBOARD</span>
    <div class="top-three" id="topThreeContainer"></div>
  </div>

  <!-- quiz card -->
  <div class="quiz-card">
    <div class="q-meta">
      <span>📋 Question <span id="qIndex">1</span>/<span id="qTotal">10</span></span>
      <span>⭐ <span id="qPoints">100</span> pts</span>
    </div>
    <div class="question-text" id="questionDisplay">Loading...</div>
    <div class="options-grid" id="optionsContainer"></div>

    <!-- feedback + next -->
    <div class="feedback-bar">
      <div class="stats">
        <span class="correct-count">✅ <span id="correctCount">0</span> right</span>
        <span class="wrong-count">❌ <span id="wrongCount">0</span> wrong</span>
      </div>
      <button class="next-btn" id="nextBtn" onclick="app.nextQuestion()" disabled>➡️ NEXT</button>
    </div>
    <div style="margin-top:12px; font-weight:600; color:#4a4a6a;" id="liveMessage"></div>
  </div>

  <!-- host controls -->
  <div class="host-controls">
    <button class="ctrl-btn" onclick="app.resetGame()">🔄 Restart Game</button>
    <button class="ctrl-btn" onclick="app.simulateAnswer()" style="background:#FF7043;">🎲 Simulate Answer (Host)</button>
  </div>
</div>

<script>
  (function(){
    // ---------- GAME DATA (extracted from HTML) ----------
    const QUESTION_BANK = [
      { type: 'vocab', q: 'What does "Aunt" mean?', options: ['Your father\'s sister', 'Your mother\'s brother', 'Your cousin', 'Your grandmother'], correct: 0, points: 100 },
      { type: 'grammar', q: 'Which sentence is correct?', options: ['My father is a doctor.', 'My father are doctor.', 'My father am doctor.', 'My father be doctor.'], correct: 0, points: 100 },
      { type: 'career', q: 'Who helps sick people?', options: ['Teacher', 'Doctor', 'Firefighter', 'Chef'], correct: 1, points: 100 },
      { type: 'family', q: 'Your uncle is your...', options: ['Father\'s brother', 'Mother\'s sister', 'Grandfather', 'Cousin'], correct: 0, points: 100 },
      { type: 'grammar', q: 'Choose the right sentence:', options: ['She can cooks.', 'She can cooking.', 'She can cook.', 'She cans cook.'], correct: 2, points: 100 },
      { type: 'vocab', q: 'What is a "firefighter"?', options: ['Puts out fires', 'Flies airplanes', 'Teaches kids', 'Builds houses'], correct: 0, points: 100 },
      { type: 'family', q: 'Your cousin is...', options: ['Child of your aunt/uncle', 'Your brother', 'Your parent', 'Your grandparent'], correct: 0, points: 100 },
      { type: 'grammar', q: 'I ___ a student.', options: ['is', 'am', 'are', 'be'], correct: 1, points: 100 },
      { type: 'career', q: 'Who works in a school?', options: ['Doctor', 'Police officer', 'Teacher', 'Pilot'], correct: 2, points: 100 },
      { type: 'vocab', q: 'What is a "grandchild"?', options: ['Child of your son/daughter', 'Your uncle', 'Your cousin', 'Your sibling'], correct: 0, points: 100 }
    ];

    // ---------- Global state ----------
    let sessionId = 'FAM' + Math.floor(Math.random()*1000).toString().padStart(3,'0');
    let players = new Map(); // key: id -> { name, score, deviceId? }
    let currentQIndex = 0;
    let questionLocked = false;
    let questionStats = { correct: 0, wrong: 0, responders: new Set() };
    let hostName = 'Teacher (Host)';
    
    // local player
    let localPlayerId = null;
    let localPlayerName = '';

    // ----- helper functions -----
    function broadcastState() {
      // In real multiplayer, use WebSocket. Here we simulate via localStorage + polling.
      const state = {
        sessionId, players: Array.from(players.entries()), currentQIndex, questionLocked,
        questionStats: { correct: questionStats.correct, wrong: questionStats.wrong, responders: Array.from(questionStats.responders) },
        hostName
      };
      localStorage.setItem('quizGameState', JSON.stringify(state));
    }

    function loadStateFromStorage() {
      const saved = localStorage.getItem('quizGameState');
      if(saved) {
        try {
          const state = JSON.parse(saved);
          if(state.sessionId !== sessionId) sessionId = state.sessionId;
          players = new Map(state.players);
          currentQIndex = state.currentQIndex;
          questionLocked = state.questionLocked;
          questionStats = { 
            correct: state.questionStats.correct, 
            wrong: state.questionStats.wrong, 
            responders: new Set(state.questionStats.responders) 
          };
          hostName = state.hostName;
        } catch(e){}
      }
    }

    // UI update
    function renderAll() {
      document.getElementById('sessionIdDisplay').innerText = sessionId;
      const url = window.location.href.split('?')[0] + '?session=' + sessionId;
      document.getElementById('gameUrl').innerText = url.length>35 ? url.substr(0,35)+'…' : url;
      renderQR(url);
      
      // players list
      const playerListDiv = document.getElementById('playerList');
      const playerCountSpan = document.getElementById('playerCount');
      const arr = Array.from(players.values());
      playerCountSpan.innerText = arr.length;
      playerListDiv.innerHTML = arr.map(p => `<span class="player-badge">${p.name} (${p.score})</span>`).join('');
      
      // top three
      const sorted = arr.sort((a,b) => b.score - a.score).slice(0,3);
      const topDiv = document.getElementById('topThreeContainer');
      topDiv.innerHTML = sorted.map((p,i) => {
        let medal = i===0?'🥇':i===1?'🥈':'🥉';
        return `<div class="top-player"><span class="trophy">${medal}</span> ${p.name} <span style="margin-left:6px;">${p.score}</span></div>`;
      }).join('');
      
      // question
      const q = QUESTION_BANK[currentQIndex];
      document.getElementById('qIndex').innerText = currentQIndex+1;
      document.getElementById('qTotal').innerText = QUESTION_BANK.length;
      document.getElementById('qPoints').innerText = q.points;
      document.getElementById('questionDisplay').innerText = q.q;
      const optsDiv = document.getElementById('optionsContainer');
      const letters = ['A', 'B', 'C', 'D'];
      optsDiv.innerHTML = q.options.map((opt, idx) => `
        <div class="opt-btn" onclick="app.answerQuestion(${idx})" id="opt${idx}">
          <span class="opt-prefix">${letters[idx]}</span> ${opt}
        </div>
      `).join('');
      
      // stats
      document.getElementById('correctCount').innerText = questionStats.correct;
      document.getElementById('wrongCount').innerText = questionStats.wrong;
      
      // lock UI
      const btns = document.querySelectorAll('.opt-btn');
      btns.forEach((b,i) => {
        if(questionLocked || (localPlayerId && questionStats.responders.has(localPlayerId))) {
          b.classList.add('disabled-true');
        } else {
          b.classList.remove('disabled-true');
        }
      });
      document.getElementById('nextBtn').disabled = !questionLocked;
      
      // live message (top winners after answer)
      const msgDiv = document.getElementById('liveMessage');
      if(questionLocked && sorted.length) {
        msgDiv.innerHTML = `🏅 Top after Q${currentQIndex+1}: ${sorted.map(p=>p.name).join(' · ')}`;
      } else {
        msgDiv.innerHTML = questionLocked ? '✅ Answers locked · waiting for next' : '📢 Choose your answer!';
      }
    }

    function renderQR(url) {
      const qrDiv = document.getElementById('qrContainer');
      qrDiv.innerHTML = '';
      // simple QR using canvas (simulate)
      const canvas = document.createElement('canvas');
      canvas.width = 120; canvas.height = 120;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1A2B4A';
      ctx.fillRect(0,0,120,120);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('📱',60,45);
      ctx.font = '12px monospace';
      ctx.fillText('SCAN',60,75);
      ctx.fillText('TO JOIN',60,95);
      qrDiv.appendChild(canvas);
    }

    // sync across tabs (simulate multiplayer)
    function syncFromStorage() {
      loadStateFromStorage();
      renderAll();
    }

    // ----- public app methods -----
    window.app = {
      joinGame() {
        const input = document.getElementById('playerNameInput');
        const name = input.value.trim();
        if(!name) { alert('Enter a name!'); return; }
        localPlayerName = name;
        localPlayerId = 'p_' + Date.now() + '_' + Math.random().toString(36);
        players.set(localPlayerId, { name, score: 0 });
        document.getElementById('nameModal').style.display = 'none';
        broadcastState();
        renderAll();
        // if host (first player) set hostname
        if(players.size === 1) hostName = name;
        broadcastState();
      },

      answerQuestion(optIdx) {
        if(questionLocked) return;
        if(!localPlayerId) { alert('Join first!'); return; }
        if(questionStats.responders.has(localPlayerId)) return;
        
        const q = QUESTION_BANK[currentQIndex];
        const isCorrect = (optIdx === q.correct);
        if(isCorrect) {
          const player = players.get(localPlayerId);
          if(player) player.score += q.points;
          questionStats.correct++;
        } else {
          questionStats.wrong++;
        }
        questionStats.responders.add(localPlayerId);
        
        // check if all answered? we don't auto-lock, host can lock via next (but simulate lock after 1st answer for demo)
        // for better experience: auto-lock when >0 answers? we keep next manual.
        broadcastState();
        renderAll();
      },

      nextQuestion() {
        if(!questionLocked) return;
        if(currentQIndex < QUESTION_BANK.length - 1) {
          currentQIndex++;
          questionLocked = false;
          questionStats = { correct:0, wrong:0, responders: new Set() };
          broadcastState();
          renderAll();
        } else {
          alert('🎉 Game finished! Check leaderboard. Restart to play again.');
        }
      },

      resetGame() {
        currentQIndex = 0;
        questionLocked = false;
        questionStats = { correct:0, wrong:0, responders: new Set() };
        // keep players but reset scores
        for(let [id, p] of players) { p.score = 0; }
        broadcastState();
        renderAll();
      },

      simulateAnswer() {
        // for host demo: lock question manually
        if(!questionLocked) {
          questionLocked = true;
          broadcastState();
          renderAll();
        }
      },

      init() {
        // check if name already? show modal
        if(!localPlayerId) {
          document.getElementById('nameModal').style.display = 'flex';
        } else {
          document.getElementById('nameModal').style.display = 'none';
        }
        // load from storage (multiplayer simulation)
        syncFromStorage();
        // polling other tabs
        setInterval(() => {
          syncFromStorage();
        }, 800);
        renderAll();
      }
    };

    // expose
    window.onload = () => { app.init(); };
    // also listen storage for cross-tab
    window.addEventListener('storage', (e) => {
      if(e.key === 'quizGameState') syncFromStorage();
    });
  })();
</script>
</body>
</html>
